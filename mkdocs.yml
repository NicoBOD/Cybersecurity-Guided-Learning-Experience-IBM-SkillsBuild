site_name: Apprendre la cybersécurité avec Nicolas BODAINE
site_url: https://cybersecurite.bodaine.fr/
site_description: Parcours d'apprentissage guidés en cybersécurité (8 et 20 sessions) alignés avec IBM SkillsBuild.
edit_uri: https://github.com/NicoBOD/Cybersecurity-Guided-Learning-Experience-IBM-SkillsBuild/edit/main/docs/

# Fichiers exclus (masqués pour le visiteur, non compilés en HTML)
exclude_docs: |
  _template.md
  !.well-known/
  documents-de-travail/

# Fichier présent mais volontairement hors de la navigation principale (accessible via le footer)
not_in_nav: |
  mentions-legales/index.md

theme:
  name: material
  language: fr
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Suit la préférence système (clair/sombre)
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Passer en mode clair
    # Mode clair
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    # Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Revenir au thème système
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.indexes
    - navigation.prune
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      lang: fr
  - git-revision-date-localized:
      type: date
      locale: fr
      enable_creation_date: true
      fallback_to_build_date: true
  - glightbox
  - minify:
      minify_html: true
      htmlmin_opts:
        remove_comments: true

extra_css:
  - stylesheets/extra.css

copyright: >
  &copy; 2026 Nicolas BODAINE | <a href="/mentions-legales/">Mentions légales</a> | <a href="https://skills.yourlearning.ibm.com/activity/PLAN-EC6B83791960" target="_blank" rel="noopener">Plan de formation IBM SkillsBuild</a>

extra:
  generator: false
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/bodaine
      name: Nicolas BODAINE sur LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/NicoBOD
      name: NicoBOD sur GitHub
    - icon: fontawesome/solid/globe
      link: https://nicolas.bodaine.fr
      name: Portfolio de Nicolas BODAINE

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

